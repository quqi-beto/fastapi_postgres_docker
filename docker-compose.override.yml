services:
  app:
    # Mount the source code for live reload during development
    volumes:
      - .:/app
    # Override command with --reload for hot-reloading
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    # Load environment variables from .env file (local overrides)
    env_file:
      - .env
